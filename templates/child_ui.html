<!DOCTYPE html>
<html>
<head>
    <title>Neoclaw | Simulation</title>
    <style>
        body { font-family: 'Segoe UI'; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .simulator-card { width: 380px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; }
        .role-selector { padding: 10px; background: #eee; text-align: center; font-size: 13px; }
        #chat-area { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        
        .bubble { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .stranger-msg { background: white; align-self: flex-start; }
        .child-msg { background: #dcf8c6; align-self: flex-end; }
        
        /* The Nudges */
        .nudge { background: #fff3cd; color: #856404; align-self: center; text-align: center; font-size: 12px; font-weight: bold; padding: 10px; border-radius: 5px; border: 1px solid #ffeeba; width: 90%; }
        
        .footer { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="role-selector">
        <b>Acting as:</b> 
        <select id="role">
            <option value="Stranger">Stranger (External)</option>
            <option value="Child">Child (Your Device)</option>
        </select>
    </div>

    <div class="simulator-card">
        <div class="header">Neoclaw Child Device</div>
        <div id="chat-area"></div>
        <div class="footer">
            <input type="text" id="msgInput" placeholder="Type message...">
            <button onclick="send()">Send</button>
        </div>
    </div>
    
    <p><a href="/">View Parent Dashboard</a></p>

    <script>
        async function send() {
            const role = document.getElementById('role').value;
            const text = document.getElementById('msgInput').value;
            if(!text) return;

            const chat = document.getElementById('chat-area');
            
            // Add message bubble
            const div = document.createElement('div');
            div.className = `bubble ${role === 'Stranger' ? 'stranger-msg' : 'child-msg'}`;
            div.innerText = text;
            chat.appendChild(div);
            document.getElementById('msgInput').value = '';

            // Send to Backend
            const res = await fetch('/process_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sender: role, message: text })
            });
            const data = await res.json();

            // Show Nudge if risk detected
            if(data.nudge) {
                setTimeout(() => {
                    const n = document.createElement('div');
                    n.className = 'nudge';
                    n.innerText = data.nudge;
                    chat.appendChild(n);
                    chat.scrollTop = chat.scrollHeight;
                }, 500);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
